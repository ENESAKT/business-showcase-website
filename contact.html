<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Atlas Studio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="container nav">
      <a class="logo" href="index.html">Atlas<span>Studio</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="references.html">References</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1>Contact</h1>
    <form class="contact-form" action="#" method="post">
      <label>Name <input type="text" name="name" required></label>
      <label>Email <input type="email" name="email" required></label>
      <label>Message <textarea name="message" rows="5" required></textarea></label>
      <button class="btn primary" type="submit">Send</button>
    </form>
    <p class="muted">Static template — wire the form to your backend or a form service.</p>
  </main>

  <footer class="site-footer">
    <p class="container">Template built with plain HTML &amp; CSS</p>
  </footer>
</body>
</html>
